<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Sevgi Dolu Kedim</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
        }

        .game-world {
            width: 100%; height: 100%;
            background: url('arkaplan.png') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            transition: filter 1s ease;
        }

        /* YENİ, DAHA TATLI ÜST PANEL */
        .top-ui {
            position: absolute; top: 15px; width: 90%; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px; border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(255, 179, 193, 0.6); /* Pembe tatlı bir gölge */
            z-index: 100;
        }
        
        .stat-box { display: flex; align-items: center; gap: 10px; }
        
        /* Emojiler için küçük yuvarlak arka planlar */
        .icon { 
            font-size: 20px; background: white; border-radius: 50%; 
            padding: 5px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
        }

        /* Şeker çubuğu tarzı barlar */
        .bar-bg { 
            flex-grow: 1; height: 22px; background: #fff0f3; 
            border: 3px solid #ffb3c1; border-radius: 20px; overflow: hidden; 
        }
        .bar-fill { 
            height: 100%; border-radius: 15px; 
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* Çizgili Desenler (Candy Stripes) */
        .candy-orange { background: repeating-linear-gradient(45deg, #ff9f1c, #ff9f1c 10px, #ffbf69 10px, #ffbf69 20px); }
        .candy-pink { background: repeating-linear-gradient(45deg, #ff4d6d, #ff4d6d 10px, #ff758f 10px, #ff758f 20px); }
        .candy-blue { background: repeating-linear-gradient(45deg, #4cc9f0, #4cc9f0 10px, #90e0ef 10px, #90e0ef 20px); }

        /* KARAKTER KONTEYNER */
        .character-area {
            position: relative; width: 100%; height: 40%;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 20px;
        }

        #pet {
            width: 260px; z-index: 10; cursor: pointer;
            transition: transform 0.2s;
            animation: idleBreath 3s ease-in-out infinite;
        }

        @keyframes idleBreath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02) translateY(-3px); }
        }

        /* PARTİKÜL EFEKTİ (Fıskiye gibi saçılma) */
        .particle {
            position: absolute; pointer-events: none; z-index: 15;
            font-size: 28px; bottom: 30%; left: 50%;
            animation: fountain 1s ease-out forwards;
        }
        @keyframes fountain {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: translate(var(--x), var(--y)) scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: translate(var(--x), calc(var(--y) + 80px)) scale(1) rotate(360deg); opacity: 0; }
        }

        /* DÜŞÜNCE BALONU */
        .chat-bubble {
            position: absolute; bottom: 105%;
            background: white; border: 4px solid #000;
            padding: 15px 20px; border-radius: 30px; 
            font-weight: 800; color: #000; font-size: 16px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.15);
            display: none; z-index: 50; text-align: center; min-width: 180px; max-width: 80%;
        }
        
        .chat-bubble::before {
            content: ''; position: absolute; bottom: -20px; left: 45%;
            width: 16px; height: 16px; background: white; border: 4px solid #000; border-radius: 50%;
        }
        .chat-bubble::after {
            content: ''; position: absolute; bottom: -35px; left: 40%;
            width: 8px; height: 8px; background: white; border: 4px solid #000; border-radius: 50%;
        }

        /* ALT PANEL */
        .bottom-ui {
            width: 100%; padding: 15px 10px 30px 10px;
            display: flex; justify-content: center; gap: 12px;
            background: rgba(255,255,255,0.3); backdrop-filter: blur(5px);
            border-top: 3px solid rgba(0,0,0,0.1); z-index: 100;
        }
        .action-btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid #000; background: #fff;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 0px #000; transition: 0.1s;
            display: flex; justify-content: center; align-items: center;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0px #000; }
        
        .btn-love { background: #ffb3c1; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="muzik.mp3" type="audio/mpeg">
</audio>

<div class="game-world" id="world">
    <div class="top-ui">
        <div class="stat-box"><span class="icon">🍗</span><div class="bar-bg"><div id="hunger" class="bar-fill candy-orange" style="width:80%"></div></div></div>
        <div class="stat-box"><span class="icon">❤️</span><div class="bar-bg"><div id="happy" class="bar-fill candy-pink" style="width:80%"></div></div></div>
        <div class="stat-box"><span class="icon">🧼</span><div class="bar-bg"><div id="clean" class="bar-fill candy-blue" style="width:100%"></div></div></div>
    </div>

    <div class="character-area" id="char-area">
        <div class="chat-bubble" id="bubble">Seni çok seviyorum! ❤️</div>
        <img src="kedi_uyanik.png" id="pet" alt="Kedi" onclick="sayLove(); spawnParticles(['❤️', '✨', '💖'])">
    </div>

    <div class="bottom-ui">
        <button class="action-btn" title="Besle" onclick="playAction('feed')">🐟</button>
        <button class="action-btn" title="Oyna" onclick="playAction('play')">🧶</button>
        <button class="action-btn btn-love" title="Bana Güzel Bir Şey Söyle" onclick="playAction('quote')">💌</button>
        <button class="action-btn" title="Yıka" onclick="playAction('wash')">🧼</button>
        <button class="action-btn" title="Uyut" onclick="playAction('sleep')">🌙</button>
    </div>
</div>

<script>
    let data = { hunger: 80, happy: 80, clean: 100, isSleeping: false };
    
    // Müzik Başlatma
    let musicStarted = false;
    document.body.addEventListener('click', () => {
        if(!musicStarted) {
            let bgm = document.getElementById('bg-music');
            bgm.volume = 0.4; 
            bgm.play().catch(e => console.log("Müzik çalma hatası:", e));
            musicStarted = true;
        }
    });

    const messages = [
        "Sen harika birisin!", "Bugün çok güzelsin ✨", "İyi ki varsın ❤️", "Seninle her şey çok güzel", 
        "Hadi biraz oyun oynayalım mı?", "Dünyanın en tatlı sahibi sensin", "Mırrrr... Huzur doluyum",
        "Sana kocaman sarılmak istiyorum", "Kalbim senin için çarpıyor 🐾", "Asla pes etme, başarabilirsin!",
        "Gülümsemen beni mutlu ediyor", "Seninle vakit geçirmek en sevdiğim şey", "Birlikte çok güçlüyüz!",
        "Her zaman yanındayım ❤️", "Biraz dinlenmeye ne dersin?", "Sen çok özelsin, unutma!",
        "Miyav! Senin sevgin bana yetiyor", "Günün harika geçsin!", "En yakın arkadaşım sensin",
        "Ellerini çok seviyorum", "Seni görmek içimi ısıtıyor", "Hadi bir kahve iç ve rahatla ☕",
        "Her zorluğu birlikte aşarız", "Senin sevginle büyüyorum", "Parlamaya devam et! 🌟",
        "Benim süper kahramanım sensin", "Daima gülümse!", "Seninle gurur duyuyorum",
        "Gel biraz dertleşelim mi?", "Hayallerinin peşinden git!"
    ];

    function sayLove() {
        if(data.isSleeping) return;
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        saySomething(randomMsg);
    }

    let bubbleTimeout; // Baloncuğun süresini kontrol etmek için değişken eklendi

    function saySomething(text) {
        const b = document.getElementById('bubble');
        b.innerText = text;
        b.style.display = 'block';
        
        // Eğer önceki bir zamanlayıcı varsa onu iptal et (üst üste tıklanırsa baloncuk erken kaybolmaz)
        clearTimeout(bubbleTimeout); 
        
        // Baloncuğun ekranda kalma süresini 6 SİYEYE (6000ms) çıkardım
        bubbleTimeout = setTimeout(() => b.style.display = 'none', 6000); 
    }

    function spawnParticles(emojiList) {
        if(data.isSleeping) return;
        const area = document.getElementById('char-area');
        for(let i=0; i<8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            const xMove = (Math.random() - 0.5) * 150; 
            const yMove = - (80 + Math.random() * 100); 
            
            p.style.setProperty('--x', xMove + 'px');
            p.style.setProperty('--y', yMove + 'px');
            
            area.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    function playAction(type) {
        if(data.isSleeping && type !== 'sleep') {
            saySomething("Zzz... Rüyalar alemindeyim 😴");
            return;
        }

        if(type === 'feed') {
            data.hunger = Math.min(100, data.hunger + 20);
            spawnParticles(['🐟', '🍗', '🍖', '🍣']); 
            saySomething("Nyam nyam! Çok lezzetli!");
        } else if(type === 'play') {
            data.happy = Math.min(100, data.happy + 25);
            spawnParticles(['🧶', '🎾', '✨']); 
            saySomething("Oley! Oyun oynamaya bayılıyorum!");
        } else if(type === 'quote') {
            data.happy = Math.min(100, data.happy + 10);
            spawnParticles(['❤️', '💖', '🥰', '💌']); 
            sayLove(); 
        } else if(type === 'wash') {
            data.clean = 100;
            spawnParticles(['🧼', '🫧', '💧']); 
            saySomething("Ohh! Mis gibi oldum, teşekkürler!");
        } else if(type === 'sleep') {
            data.isSleeping = !data.isSleeping;
            const world = document.getElementById('world');
            const pet = document.getElementById('pet');
            if(data.isSleeping) {
                pet.src = "kedi_uyuyor.png";
                world.style.filter = "brightness(0.4)";
                saySomething("Rüyamda seni göreceğim... İyi uykular ❤️");
            } else {
                pet.src = "kedi_uyanik.png";
                world.style.filter = "brightness(1)";
                saySomething("Günaydın dünyam! ☀️");
            }
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('hunger').style.width = data.hunger + '%';
        document.getElementById('happy').style.width = data.happy + '%';
        document.getElementById('clean').style.width = data.clean + '%';
    }

    setInterval(() => {
        if(!data.isSleeping) {
            data.hunger = Math.max(0, data.hunger - 1);
            data.happy = Math.max(0, data.happy - 1);
            data.clean = Math.max(0, data.clean - 0.5);
            updateUI();
        }
    }, 6000);

    updateUI();
</script>

</body>
</html>
