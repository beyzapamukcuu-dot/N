<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Sevgi Dolu Kedim</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; }

        .game-world {
            width: 100%; height: 100%;
            background: url('arkaplan.png') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            transition: filter 1s ease;
        }

        /* ÜST PANEL */
        .top-ui {
            position: absolute; top: 0; width: 95%; padding: 12px;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 0 0 20px 20px; border: 3px solid #000; z-index: 100;
        }
        .stat-box { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .bar-bg { flex-grow: 1; height: 12px; background: #eee; border: 2px solid #000; border-radius: 10px; }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }

        /* KARAKTER KONTEYNER - EN AŞAĞIDA */
        .character-area {
            position: relative; width: 100%; height: 40%;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 20px; /* Butonların hemen üstünde durması için */
        }

        #pet {
            width: 260px; z-index: 10; cursor: pointer;
            transition: transform 0.2s;
            animation: idleBreath 3s ease-in-out infinite;
        }

        /* EFEKT PARTİKÜLLERİ */
        .particle {
            position: absolute; pointer-events: none; z-index: 15;
            font-size: 24px; animation: particleUp 0.8s ease-out forwards;
        }
        @keyframes particleUp {
            0% { transform: translateY(0) opacity: 1; }
            100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
        }

        @keyframes idleBreath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02) translateY(-3px); }
        }

        /* KONUŞMA BALONU */
        .chat-bubble {
            position: absolute; bottom: 105%;
            background: white; border: 4px solid #000;
            padding: 10px 15px; border-radius: 20px;
            font-weight: bold; color: #000; font-size: 14px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            display: none; z-index: 50; text-align: center; min-width: 150px;
        }
        .chat-bubble::after {
            content: ''; position: absolute; bottom: -14px; left: 50%;
            border-width: 14px 14px 0; border-style: solid;
            border-color: #000 transparent transparent; margin-left: -14px;
        }

        /* ALT PANEL */
        .bottom-ui {
            width: 100%; padding: 15px 15px 30px 15px;
            display: flex; justify-content: center; gap: 10px;
            background: rgba(255,255,255,0.3); backdrop-filter: blur(5px);
            border-top: 3px solid rgba(0,0,0,0.1); z-index: 100;
        }
        .action-btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid #000; background: #fff;
            font-size: 25px; cursor: pointer;
            box-shadow: 0 4px 0px #000; transition: 0.1s;
        }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0px #000; }
    </style>
</head>
<body>

<div class="game-world" id="world">
    <div class="top-ui">
        <div class="stat-box"><span>🍖</span><div class="bar-bg"><div id="hunger" class="bar-fill" style="background:#ff9f1c; width:80%"></div></div></div>
        <div class="stat-box"><span>❤️</span><div class="bar-bg"><div id="happy" class="bar-fill" style="background:#ff4d6d; width:80%"></div></div></div>
        <div class="stat-box"><span>🧼</span><div class="bar-bg"><div id="clean" class="bar-fill" style="background:#4cc9f0; width:100%"></div></div></div>
        <div id="coin-text" style="font-weight:bold; text-align:right;">🐾 0</div>
    </div>

    <div class="character-area" id="char-area">
        <div class="chat-bubble" id="bubble">Seni çok seviyorum! ❤️</div>
        <img src="kedi_uyanik.png" id="pet" alt="Kedi" onclick="actionEffect('❤️'); sayLove()">
    </div>

    <div class="bottom-ui">
        <button class="action-btn" onclick="playAction('feed')">🐟</button>
        <button class="action-btn" onclick="playAction('play')">🧶</button>
        <button class="action-btn" onclick="playAction('wash')">🧼</button>
        <button class="action-btn" onclick="playAction('sleep')">🌙</button>
    </div>
</div>

<script>
    let data = { hunger: 80, happy: 80, clean: 100, coins: 0, isSleeping: false };
    
    const messages = [
        "Sen harika birisin!", "Bugün çok güzelsin ✨", "İyi ki varsın ❤️", "Seninle her şey çok güzel", 
        "Hadi biraz oyun oynayalım mı?", "Dünyanın en tatlı sahibi sensin", "Mırrrr... Huzur doluyum",
        "Sana kocaman sarılmak istiyorum", "Kalbim senin için çarpıyor 🐾", "Asla pes etme, başarabilirsin!",
        "Gülümsemen beni mutlu ediyor", "Seninle vakit geçirmek en sevdiğim şey", "Birlikte çok güçlüyüz!",
        "Her zaman yanındayım ❤️", "Biraz dinlenmeye ne dersin?", "Sen çok özelsin, unutma!",
        "Miyav! Senin sevgin bana yetiyor", "Günün harika geçsin!", "En yakın arkadaşım sensin",
        "Ellerini çok seviyorum", "Seni görmek içimi ısıtıyor", "Hadi bir kahve iç ve rahatla ☕",
        "Her zorluğu birlikte aşarız", "Senin sevginle büyüyorum", "Parlamaya devam et! 🌟",
        "Benim süper kahramanım sensin", "Daima gülümse!", "Seninle gurur duyuyorum",
        "Gel biraz dertleşelim mi?", "Hayallerinin peşinden git!"
    ];

    function sayLove() {
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        saySomething(randomMsg);
    }

    function saySomething(text) {
        const b = document.getElementById('bubble');
        b.innerText = text;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3500);
    }

    function actionEffect(emoji) {
        const area = document.getElementById('char-area');
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emoji;
            p.style.left = (40 + Math.random() * 20) + '%';
            p.style.bottom = (20 + Math.random() * 40) + '%';
            area.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    function playAction(type) {
        if(data.isSleeping && type !== 'sleep') {
            saySomething("Zzz... Rüyalar alemindeyim 😴");
            return;
        }

        if(type === 'feed') {
            data.hunger = Math.min(100, data.hunger + 20);
            data.coins += 5;
            actionEffect('🐟');
            saySomething("Nyam! Tadı damağımda kaldı!");
        } else if(type === 'play') {
            data.happy = Math.min(100, data.happy + 25);
            data.coins += 15;
            actionEffect('✨');
            sayLove();
        } else if(type === 'wash') {
            data.clean = 100;
            actionEffect('🧼');
            actionEffect('🫧');
            saySomething("Ohh! Mis gibi oldum, teşekkürler!");
        } else if(type === 'sleep') {
            data.isSleeping = !data.isSleeping;
            const world = document.getElementById('world');
            const pet = document.getElementById('pet');
            if(data.isSleeping) {
                pet.src = "kedi_uyuyor.png";
                world.style.filter = "brightness(0.4)";
                saySomething("Rüyamda seni göreceğim... İyi uykular ❤️");
            } else {
                pet.src = "kedi_uyanik.png";
                world.style.filter = "brightness(1)";
                saySomething("Günaydın dünyam! ☀️");
            }
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('hunger').style.width = data.hunger + '%';
        document.getElementById('happy').style.width = data.happy + '%';
        document.getElementById('clean').style.width = data.clean + '%';
        document.getElementById('coin-text').innerText = '🐾 ' + data.coins;
    }

    setInterval(() => {
        if(!data.isSleeping) {
            data.hunger = Math.max(0, data.hunger - 1);
            data.happy = Math.max(0, data.happy - 1);
            updateUI();
        }
    }, 6000);

    updateUI();
</script>

</body>
</html>
